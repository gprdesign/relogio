<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relógio</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    font-family: "Press Start 2P", monospace;
    color: #fff;
  }
  #hora {
    font-size: clamp(2.5rem, 12vw, 7rem);
    font-weight: normal;
    letter-spacing: 4px;
    line-height: 1;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
  }
  .progress-wrap {
    width: clamp(200px, 50vw, 500px);
    height: 6px;
    background: #222;
    border-radius: 0px;
    margin: 28px 0 20px;
    overflow: hidden;
    image-rendering: pixelated;
  }
  #barra {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #555, #fff);
    transition: width 1s linear;
  }
  #data {
    font-size: clamp(0.5rem, 2vw, 0.85rem);
    color: #666;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div id="hora">00:00</div>
  <div class="progress-wrap">
    <div id="barra"></div>
  </div>
  <div id="data">--</div>
  <script>
    const dias = ["DOMINGO","SEGUNDA","TERCA","QUARTA","QUINTA","SEXTA","SABADO"];
    const meses = ["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
    function atualizar() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,"0");
      const m = String(now.getMinutes()).padStart(2,"0");
      const s = now.getSeconds();
      document.getElementById("hora").textContent = h + ":" + m;
      document.getElementById("data").textContent =
        dias[now.getDay()] + "  " + now.getDate() + " " + meses[now.getMonth()] + " " + now.getFullYear();
      document.getElementById("barra").style.width = ((s / 60) * 100) + "%";
    }
    atualizar();
    setInterval(atualizar, 1000);
  </script>
</body>
</html>
