<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relógio</title>
<!-- v5 -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #card {
    width: 300px;
    height: 170px;
    min-width: 300px;
    min-height: 170px;
    max-width: 300px;
    max-height: 170px;
    background: #0d0d0d;
    color: #fff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP: relógio ── */
  .top {
    flex: 0 0 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
  }

  #hora {
    font-family: "Press Start 2P", monospace;
    font-size: 2.4rem;
    letter-spacing: 3px;
    line-height: 1;
  }

  .progress-wrap {
    width: 240px;
    height: 3px;
    background: #1c1c1c;
    margin: 8px 0 6px;
    overflow: hidden;
  }
  #barra {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2a2a2a, #fff);
    transition: width 1s linear;
  }

  #data {
    font-family: "Inter", sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #aaa;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* ── DIVISOR ── */
  .divider {
    flex: 0 0 1px;
    background: #1c1c1c;
  }

  /* ── BOTTOM: jogo ── */
  .bottom {
    flex: 1;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    overflow: hidden;
  }

  .jogo-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    padding: 0 12px;
  }

  .jogo-label {
    font-family: "Inter", sans-serif;
    font-size: 9px;
    font-weight: 600;
    color: #aaa;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .jogo-times {
    font-family: "Inter", sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
  }

  .jogo-vs {
    font-size: 11px;
    font-weight: 500;
    color: #aaa;
  }

  .jogo-info {
    font-family: "Inter", sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: #aaa;
    letter-spacing: 0.3px;
    line-height: 1.6;
  }

  /* ── COUNTDOWN — coluna direita verde Brasil ── */
  .jogo-right {
    flex: 0 0 110px;
    background: #e00000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .countdown {
    font-family: "Press Start 2P", monospace;
    font-size: 0.62rem;
    color: #fff;
    letter-spacing: 1px;
    line-height: 2;
    text-align: center;
    white-space: pre;
  }
</style>
</head>
<body>
  <div id="card">

    <div class="top">
      <div id="hora">00:00</div>
      <div class="progress-wrap"><div id="barra"></div></div>
      <div id="data">--</div>
    </div>

    <div class="divider"></div>

    <div class="bottom">
      <div class="jogo-left">
        <div class="jogo-label">Proximo Jogo — Brasil</div>
        <div class="jogo-times">BRA <span class="jogo-vs">vs</span> HAI</div>
        <div class="jogo-info">Sex 19/06 · 21h30 BRT<br>Filadelfia</div>
      </div>
      <div class="jogo-right">
        <div class="countdown" id="countdown">--</div>
      </div>
    </div>

  </div>

  <script>
    const DIAS  = ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
    const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    const JOGO  = new Date("2026-06-20T00:30:00Z");

    const fmtPartes = new Intl.DateTimeFormat("pt-BR", {
      timeZone: "America/Sao_Paulo",
      weekday: "long", day: "numeric", month: "numeric", year: "numeric",
      hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
    });

    function pad(n) { return String(n).padStart(2, "0"); }

    function tick() {
      const now = new Date();
      const partes = Object.fromEntries(
        fmtPartes.formatToParts(now).map(p => [p.type, p.value])
      );
      const h   = partes.hour;
      const m   = partes.minute;
      const s   = parseInt(partes.second, 10);
      const dia = parseInt(partes.day, 10);
      const mes = parseInt(partes.month, 10) - 1;
      const ano = parseInt(partes.year, 10);

      const dtBRT     = new Date(Date.UTC(ano, mes, dia, 12, 0, 0));
      const diaSemana = DIAS[dtBRT.getUTCDay()];

      document.getElementById("hora").textContent = h + ":" + m;
      document.getElementById("data").textContent =
        diaSemana + "  " + pad(dia) + " " + MESES[mes] + " " + ano;
      document.getElementById("barra").style.width = ((s / 60) * 100) + "%";

      const diff = JOGO - now;
      if (diff <= 0) {
        document.getElementById("countdown").textContent = "AO\nVIVO!";
        return;
      }
      const dd = Math.floor(diff / 86400000);
      const hh = Math.floor((diff % 86400000) / 3600000);
      const mm = Math.floor((diff % 3600000)  / 60000);
      const ss = Math.floor((diff % 60000)    / 1000);
      document.getElementById("countdown").textContent =
        pad(dd) + "D " + pad(hh) + "H\n" + pad(mm) + "M " + pad(ss) + "S";
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
