<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relógio</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; margin: 0; padding: 0;
    background: #0d0d0d;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #card {
    width: 300px;
    background: #0d0d0d; color: #fff;
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── TOP: relógio ── */
  .top {
    flex: 0 0 71px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 10px 12px 0;
  }
  #hora {
    font-family: "Press Start 2P", monospace;
    font-size: 1.85rem; letter-spacing: 3px; line-height: 1;
  }
  .progress-wrap {
    position: relative; width: 200px; height: 3px;
    background: #1c1c1c; margin: 7px 0 5px; overflow: hidden;
    outline: 1px solid rgba(255,255,255,0.5); outline-offset: 1px;
  }
  .progress-wrap::before {
    content: ''; position: absolute; top: 0; left: 0;
    height: 100%; width: 100%;
    background: rgba(255,255,255,0.25);
    transform-origin: left center; transform: scaleX(0);
    animation: pulse1s 1s linear infinite;
  }
  @keyframes pulse1s { 0% { transform: scaleX(0); } 100% { transform: scaleX(1); } }
  #barra {
    position: absolute; top: 0; left: 0; height: 100%; width: 0%;
    background: linear-gradient(90deg, #444, #fff);
    transition: width 1s linear; z-index: 1;
  }
  #data {
    font-family: "Inter", sans-serif;
    font-size: 10px; font-weight: 600; color: #aaa;
    letter-spacing: 1.5px; text-transform: uppercase;
  }

  .divider       { height: 1px; background: #1c1c1c; }
  .divider-inner { height: 1px; background: #222; }

  /* ── LINHA HORÁRIO (só aparece quando há 2 jogos simultâneos) ── */
  .horario-row {
    display: flex; flex-direction: row;
    align-items: stretch; height: 46px; overflow: hidden;
    background: rgba(255,255,255,0.05);
    border: 3px solid #FFD600;
  }
  .horario-left {
    flex: 1; min-width: 0; overflow: hidden;
    display: flex; flex-direction: column;
    justify-content: center; gap: 3px; padding: 0 10px;
  }
  .horario-label {
    font-family: "Inter", sans-serif;
    font-size: 8px; font-weight: 600; color: #aaa;
    letter-spacing: 1.2px; text-transform: uppercase;
  }
  .horario-times {
    font-family: "Inter", sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 5px;
    line-height: 1; white-space: nowrap; overflow: hidden;
  }
  .horario-times .jogo-vs { font-size: 9px; font-weight: 500; color: #aaa; }
  .horario-right {
    flex: 0 0 90px;
    display: flex; align-items: center; justify-content: center;
  }
  .horario-hora {
    font-family: "Press Start 2P", monospace;
    font-size: 0.8rem; color: #FFD600;
    letter-spacing: 1px; text-align: center;
  }

  /* ── LINHA COUNTDOWN ── */
  .jogo-row {
    display: flex; flex-direction: row;
    align-items: stretch; overflow: hidden;
  }
  .jogo-row.single { height: 99px; }
  .jogo-row.duplo  { height: 53px; }

  .jogo-left {
    flex: 1; min-width: 0; overflow: hidden;
    display: flex; flex-direction: column;
    justify-content: center; gap: 3px; padding: 0 10px;
  }
  .jogo-label {
    font-family: "Inter", sans-serif;
    font-size: 8px; font-weight: 600; color: #aaa;
    letter-spacing: 1.2px; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .jogo-label.bra { color: #ffd700; }
  .jogo-times {
    font-family: "Inter", sans-serif;
    font-weight: 700; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 5px;
    line-height: 1; white-space: nowrap; overflow: hidden;
  }
  .jogo-row.single .jogo-times { font-size: 18px; }
  .jogo-row.duplo  .jogo-times { font-size: 15px; }
  .jogo-vs { font-weight: 500; color: #aaa; }
  .jogo-row.single .jogo-vs { font-size: 11px; }
  .jogo-row.duplo  .jogo-vs  { font-size: 9px; }
  .jogo-info {
    font-family: "Inter", sans-serif;
    font-size: 9px; font-weight: 600; color: #aaa;
    letter-spacing: 0.3px; overflow: hidden;
  }

  /* ── COUNTDOWN ── */
  .jogo-right {
    flex: 0 0 100px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
  }
  .cd-label {
    font-family: "Inter", sans-serif;
    font-size: 8px; font-weight: 700; color: rgba(255,255,255,0.7);
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .countdown {
    font-family: "Press Start 2P", monospace;
    color: #fff; letter-spacing: 1px;
    text-align: center; line-height: 1;
  }
  .jogo-row.single .countdown { font-size: 0.78rem; }
  .jogo-row.duplo  .countdown { font-size: 0.72rem; }
</style>
</head>
<body>
  <div id="card">
    <div class="top">
      <div id="hora">00:00</div>
      <div class="progress-wrap"><div id="barra"></div></div>
      <div id="data">--</div>
    </div>
    <div class="divider"></div>
    <div id="jogos-container"></div>
  </div>

  <script>
    var DIAS  = ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
    var MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    var WINDOW_MS = 7200000; // 2h janela "ao vivo"

    var JOGOS = [{"utc":"2026-06-11T19:00:00Z","home":"MEX","away":"RSA"},{"utc":"2026-06-12T02:00:00Z","home":"KOR","away":"CZE"},{"utc":"2026-06-12T19:00:00Z","home":"CAN","away":"BIH"},{"utc":"2026-06-13T01:00:00Z","home":"USA","away":"PAR"},{"utc":"2026-06-13T19:00:00Z","home":"QAT","away":"SUI"},{"utc":"2026-06-13T22:00:00Z","home":"BRA","away":"MAR"},{"utc":"2026-06-14T01:00:00Z","home":"HAI","away":"SCO"},{"utc":"2026-06-14T04:00:00Z","home":"AUS","away":"TUR"},{"utc":"2026-06-14T17:00:00Z","home":"GER","away":"CUW"},{"utc":"2026-06-14T20:00:00Z","home":"NED","away":"JPN"},{"utc":"2026-06-14T23:00:00Z","home":"CIV","away":"ECU"},{"utc":"2026-06-15T02:00:00Z","home":"SWE","away":"TUN"},{"utc":"2026-06-15T16:00:00Z","home":"ESP","away":"CPV"},{"utc":"2026-06-15T19:00:00Z","home":"BEL","away":"EGY"},{"utc":"2026-06-15T22:00:00Z","home":"KSA","away":"URU"},{"utc":"2026-06-16T01:00:00Z","home":"IRN","away":"NZL"},{"utc":"2026-06-16T19:00:00Z","home":"FRA","away":"SEN"},{"utc":"2026-06-16T22:00:00Z","home":"IRQ","away":"NOR"},{"utc":"2026-06-17T01:00:00Z","home":"ARG","away":"ALG"},{"utc":"2026-06-17T04:00:00Z","home":"AUT","away":"JOR"},{"utc":"2026-06-17T17:00:00Z","home":"POR","away":"COD"},{"utc":"2026-06-17T20:00:00Z","home":"ENG","away":"CRO"},{"utc":"2026-06-17T23:00:00Z","home":"GHA","away":"PAN"},{"utc":"2026-06-18T02:00:00Z","home":"UZB","away":"COL"},{"utc":"2026-06-18T16:00:00Z","home":"CZE","away":"RSA"},{"utc":"2026-06-18T19:00:00Z","home":"SUI","away":"BIH"},{"utc":"2026-06-18T22:00:00Z","home":"CAN","away":"QAT"},{"utc":"2026-06-19T01:00:00Z","home":"MEX","away":"KOR"},{"utc":"2026-06-19T19:00:00Z","home":"USA","away":"AUS"},{"utc":"2026-06-19T22:00:00Z","home":"SCO","away":"MAR"},{"utc":"2026-06-20T00:30:00Z","home":"BRA","away":"HAI"},{"utc":"2026-06-20T03:00:00Z","home":"TUR","away":"PAR"},{"utc":"2026-06-20T17:00:00Z","home":"NED","away":"SWE"},{"utc":"2026-06-20T20:00:00Z","home":"GER","away":"CIV"},{"utc":"2026-06-21T00:00:00Z","home":"ECU","away":"CUW"},{"utc":"2026-06-21T04:00:00Z","home":"TUN","away":"JPN"},{"utc":"2026-06-21T16:00:00Z","home":"ESP","away":"KSA"},{"utc":"2026-06-21T19:00:00Z","home":"BEL","away":"IRN"},{"utc":"2026-06-21T22:00:00Z","home":"URU","away":"CPV"},{"utc":"2026-06-22T01:00:00Z","home":"NZL","away":"EGY"},{"utc":"2026-06-22T17:00:00Z","home":"ARG","away":"AUT"},{"utc":"2026-06-22T21:00:00Z","home":"FRA","away":"IRQ"},{"utc":"2026-06-23T00:00:00Z","home":"NOR","away":"SEN"},{"utc":"2026-06-23T03:00:00Z","home":"JOR","away":"ALG"},{"utc":"2026-06-23T17:00:00Z","home":"POR","away":"UZB"},{"utc":"2026-06-23T20:00:00Z","home":"ENG","away":"GHA"},{"utc":"2026-06-23T23:00:00Z","home":"PAN","away":"CRO"},{"utc":"2026-06-24T02:00:00Z","home":"COL","away":"COD"},{"utc":"2026-06-24T19:00:00Z","home":"SUI","away":"CAN"},{"utc":"2026-06-24T19:00:00Z","home":"BIH","away":"QAT"},{"utc":"2026-06-24T22:00:00Z","home":"MAR","away":"HAI"},{"utc":"2026-06-24T22:00:00Z","home":"SCO","away":"BRA"},{"utc":"2026-06-25T01:00:00Z","home":"CZE","away":"MEX"},{"utc":"2026-06-25T01:00:00Z","home":"RSA","away":"KOR"},{"utc":"2026-06-25T20:00:00Z","home":"ECU","away":"GER"},{"utc":"2026-06-25T20:00:00Z","home":"CUW","away":"CIV"},{"utc":"2026-06-25T23:00:00Z","home":"TUN","away":"NED"},{"utc":"2026-06-25T23:00:00Z","home":"JPN","away":"SWE"},{"utc":"2026-06-26T02:00:00Z","home":"TUR","away":"USA"},{"utc":"2026-06-26T02:00:00Z","home":"PAR","away":"AUS"},{"utc":"2026-06-26T19:00:00Z","home":"NOR","away":"FRA"},{"utc":"2026-06-26T19:00:00Z","home":"SEN","away":"IRQ"},{"utc":"2026-06-27T00:00:00Z","home":"URU","away":"ESP"},{"utc":"2026-06-27T00:00:00Z","home":"CPV","away":"KSA"},{"utc":"2026-06-27T03:00:00Z","home":"NZL","away":"BEL"},{"utc":"2026-06-27T03:00:00Z","home":"EGY","away":"IRN"},{"utc":"2026-06-27T21:00:00Z","home":"PAN","away":"ENG"},{"utc":"2026-06-27T21:00:00Z","home":"CRO","away":"GHA"},{"utc":"2026-06-27T23:30:00Z","home":"COL","away":"POR"},{"utc":"2026-06-27T23:30:00Z","home":"COD","away":"UZB"},{"utc":"2026-06-28T02:00:00Z","home":"JOR","away":"ARG"},{"utc":"2026-06-28T02:00:00Z","home":"ALG","away":"AUT"},{"utc":"2026-06-28T19:00:00Z","home":"RSA","away":"CAN"},{"utc":"2026-06-29T17:00:00Z","home":"BRA","away":"JPN"},{"utc":"2026-06-29T20:30:00Z","home":"GER","away":"???"},{"utc":"2026-06-30T01:00:00Z","home":"NED","away":"MAR"},{"utc":"2026-06-30T17:00:00Z","home":"CIV","away":"???"},{"utc":"2026-06-30T21:00:00Z","home":"???","away":"???"},{"utc":"2026-07-01T01:00:00Z","home":"MEX","away":"???"},{"utc":"2026-07-01T16:00:00Z","home":"???","away":"???"},{"utc":"2026-07-01T20:00:00Z","home":"???","away":"???"},{"utc":"2026-07-02T00:00:00Z","home":"USA","away":"BIH"},{"utc":"2026-07-02T19:00:00Z","home":"???","away":"???"},{"utc":"2026-07-02T23:00:00Z","home":"???","away":"???"},{"utc":"2026-07-03T03:00:00Z","home":"SUI","away":"???"},{"utc":"2026-07-03T18:00:00Z","home":"AUS","away":"???"},{"utc":"2026-07-03T22:00:00Z","home":"ARG","away":"???"},{"utc":"2026-07-04T01:30:00Z","home":"???","away":"???"},{"utc":"2026-07-04T17:00:00Z","home":"???","away":"???"},{"utc":"2026-07-04T21:00:00Z","home":"???","away":"???"},{"utc":"2026-07-05T20:00:00Z","home":"???","away":"???"},{"utc":"2026-07-06T00:00:00Z","home":"???","away":"???"},{"utc":"2026-07-06T19:00:00Z","home":"???","away":"???"},{"utc":"2026-07-07T00:00:00Z","home":"???","away":"???"},{"utc":"2026-07-07T16:00:00Z","home":"???","away":"???"},{"utc":"2026-07-07T20:00:00Z","home":"???","away":"???"},{"utc":"2026-07-09T20:00:00Z","home":"???","away":"???"},{"utc":"2026-07-10T19:00:00Z","home":"???","away":"???"},{"utc":"2026-07-11T21:00:00Z","home":"???","away":"???"},{"utc":"2026-07-12T01:00:00Z","home":"???","away":"???"},{"utc":"2026-07-14T19:00:00Z","home":"???","away":"???"},{"utc":"2026-07-15T19:00:00Z","home":"???","away":"???"},{"utc":"2026-07-18T21:00:00Z","home":"???","away":"???"},{"utc":"2026-07-19T19:00:00Z","home":"???","away":"???"}];

    function pad(n) { return String(n).padStart(2, "0"); }

    function formatarDataBRT(utcStr) {
      var dt  = new Date(utcStr);
      var brt = new Date(dt.getTime() - 3 * 3600000);
      var dias = ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
      var d   = pad(brt.getUTCDate());
      var mes = String(brt.getUTCMonth() + 1).padStart(2, "0");
      var dia = dias[brt.getUTCDay()];
      var h   = pad(brt.getUTCHours());
      var m   = pad(brt.getUTCMinutes());
      return dia + " " + d + "/" + mes + " \u00b7 " + h + "h" + m + " BRT";
    }

    // Retorna o(s) próximo(s) jogo(s) a partir de agora
    // Se houver simultâneos no mesmo horário, retorna todos
    function getProximosJogos() {
      var agora = Date.now();
      var proximo = null;

      for (var i = 0; i < JOGOS.length; i++) {
        var t = new Date(JOGOS[i].utc).getTime();
        if (t + WINDOW_MS > agora) {
          proximo = JOGOS[i].utc;
          break;
        }
      }
      if (!proximo) return [];

      // Pega todos com o mesmo horário
      return JOGOS.filter(function(j) { return j.utc === proximo; });
    }

    function makeCountdown(diff) {
      if (diff <= 0) return "AO VIVO!";
      var totalS = Math.floor(diff / 1000);
      var dd = Math.floor(totalS / 86400);
      var hh = Math.floor((totalS % 86400) / 3600);
      var mm = Math.floor((totalS % 3600)  / 60);
      var ss = totalS % 60;
      if (dd > 0) return pad(dd) + "d " + pad(hh) + "hs";
      if (hh > 0) return pad(hh) + "hs " + pad(mm) + "min " + pad(ss) + "s";
      return pad(mm) + "min " + pad(ss) + "s";
    }

    function horasBRT(utcStr) {
      var dt  = new Date(utcStr);
      var brt = new Date(dt.getTime() - 3 * 3600000);
      return pad(brt.getUTCHours()) + ":" + pad(brt.getUTCMinutes());
    }

    function renderJogos(jogos, now) {
      var container = document.getElementById("jogos-container");
      var isDuplo   = jogos.length >= 2;
      var html      = "";

      if (isDuplo) {
        // ── Linha de horário (compartilhada, fundo branco 5% + borda amarela) ──
        var jogo0 = jogos[0];
        var isBra0 = (jogo0.home === "BRA" || jogo0.away === "BRA");
        html += '<div class="horario-row">';
        html += '  <div class="horario-left">';
        html += '    <div class="horario-label">' + (isBra0 ? "\uD83C\uDDE7\uD83C\uDDF7 BRASIL + " : "") + "Copa 2026 \u00b7 " + formatarDataBRT(jogo0.utc).split("\u00b7")[0].trim() + '</div>';
        // Lista os 2 confrontos na mesma linha
        var matchups = jogos.map(function(j) {
          return '<span' + ((j.home==="BRA"||j.away==="BRA") ? ' style="color:#FFD600"' : '') + '>' + j.home + '</span>' +
                 ' <span class="jogo-vs">vs</span> ' +
                 '<span' + ((j.home==="BRA"||j.away==="BRA") ? ' style="color:#FFD600"' : '') + '>' + j.away + '</span>';
        }).join(' <span style="color:#555;font-size:10px;margin:0 4px">|</span> ');
        html += '    <div class="horario-times">' + matchups + '</div>';
        html += '  </div>';
        html += '  <div class="horario-right"><div class="horario-hora">' + horasBRT(jogo0.utc) + '\nBRT</div></div>';
        html += '</div>';
        html += '<div class="divider-inner"></div>';

        // ── Linha countdown (única, com "faltam") ──
        var diff = new Date(jogo0.utc).getTime() - now.getTime();
        var cor  = "#e00000";
        html += '<div class="jogo-row duplo">';
        html += '  <div class="jogo-left">';
        html += '    <div class="jogo-label">Próximo jogo simultâneo</div>';
        html += '    <div class="jogo-times" style="font-size:12px;color:#aaa">2 jogos no mesmo horário</div>';
        html += '  </div>';
        html += '  <div class="jogo-right" style="background:' + cor + '">';
        html += '    <div class="cd-label">faltam</div>';
        html += '    <div class="countdown" id="cd-main">' + makeCountdown(diff) + '</div>';
        html += '  </div>';
        html += '</div>';

      } else {
        // ── 1 jogo só ──
        var jogo   = jogos[0];
        var isBra  = (jogo.home === "BRA" || jogo.away === "BRA");
        var label  = isBra ? "\uD83C\uDDE7\uD83C\uDDF7 BRASIL!" : "Copa 2026";
        var diff   = new Date(jogo.utc).getTime() - now.getTime();
        html += '<div class="jogo-row single">';
        html += '  <div class="jogo-left">';
        html += '    <div class="jogo-label' + (isBra ? ' bra' : '') + '">' + label + '</div>';
        html += '    <div class="jogo-times">' + jogo.home + ' <span class="jogo-vs">vs</span> ' + jogo.away + '</div>';
        html += '    <div class="jogo-info">' + formatarDataBRT(jogo.utc) + '</div>';
        html += '  </div>';
        html += '  <div class="jogo-right" style="background:#e00000">';
        html += '    <div class="cd-label">faltam</div>';
        html += '    <div class="countdown" id="cd-main">' + makeCountdown(diff) + '</div>';
        html += '  </div>';
        html += '</div>';
      }

      container.innerHTML = html;
    }

    var fmtPartes = new Intl.DateTimeFormat("pt-BR", {
      timeZone: "America/Sao_Paulo",
      weekday: "long", day: "numeric", month: "numeric", year: "numeric",
      hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
    });

    var lastJogosKey = "";

    function tick() {
      var now    = new Date();
      var partes = Object.fromEntries(
        fmtPartes.formatToParts(now).map(function(p) { return [p.type, p.value]; })
      );
      var h   = partes.hour;
      var m   = partes.minute;
      var s   = parseInt(partes.second, 10);
      var dia = parseInt(partes.day, 10);
      var mes = parseInt(partes.month, 10) - 1;
      var ano = parseInt(partes.year, 10);

      var dtBRT     = new Date(Date.UTC(ano, mes, dia, 12, 0, 0));
      var diaSemana = DIAS[dtBRT.getUTCDay()];

      document.getElementById("hora").textContent = h + ":" + m;
      document.getElementById("data").textContent =
        diaSemana + "  " + pad(dia) + " " + MESES[mes] + " " + ano;
      document.getElementById("barra").style.width = ((s / 60) * 100) + "%";

      var jogos = getProximosJogos();

      if (jogos.length === 0) {
        document.getElementById("jogos-container").innerHTML =
          '<div class="jogo-row single">' +
          '<div class="jogo-left">' +
          '<div class="jogo-label">Copa 2026</div>' +
          '<div class="jogo-times">--- <span class="jogo-vs">vs</span> ---</div>' +
          '<div class="jogo-info">Fim dos jogos</div>' +
          '</div>' +
          '<div class="jogo-right"><div class="countdown">\u2014</div></div>' +
          '</div>';
        return;
      }

      // Só re-renderiza estrutura se mudou o conjunto de jogos
      var key = jogos.map(function(j) { return j.utc + j.home + j.away; }).join("|");
      if (key !== lastJogosKey) {
        renderJogos(jogos, now);
        lastJogosKey = key;
      } else {
        // Atualiza só o countdown principal
        var cd = document.getElementById("cd-main");
        if (cd) {
          var diff = new Date(jogos[0].utc).getTime() - now.getTime();
          cd.textContent = makeCountdown(diff);
        }
      }
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
