<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relógio</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    font-family: "Press Start 2P", monospace;
    color: #fff;
    height: 100dvh;
    display: grid;
    grid-template-rows: 1fr 1px 1fr;
    overflow: hidden;
  }

  /* ══ METADE DE CIMA: relógio ══ */
  .top {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 0 24px;
  }
  #hora {
    font-size: clamp(4rem, 18vw, 9rem);
    letter-spacing: 6px;
    line-height: 1;
  }
  .progress-wrap {
    width: min(80vw, 520px);
    height: 6px;
    background: #1c1c1c;
    margin: 20px 0 14px;
    overflow: hidden;
  }
  #barra {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2a2a2a, #fff);
    transition: width 1s linear;
  }
  #data {
    font-size: clamp(0.5rem, 2vw, 0.8rem);
    color: #444;
    letter-spacing: 4px;
  }

  /* divisor */
  .divider { background: #1c1c1c; }

  /* ══ METADE DE BAIXO: foto + jogo ══ */
  .bottom {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    overflow: hidden;
  }

  /* foto ocupa metade da largura */
  .foto-wrap {
    flex: 0 0 48%;
    overflow: hidden;
  }
  .foto-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* card jogo na outra metade */
  .jogo-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: clamp(10px, 2.5vh, 22px);
    padding: clamp(16px, 4vw, 36px);
    border-left: 1px solid #1c1c1c;
  }
  .jogo-label {
    font-size: clamp(0.4rem, 1.4vw, 0.65rem);
    color: #333;
    letter-spacing: 3px;
  }
  .jogo-times {
    font-size: clamp(1rem, 4vw, 1.8rem);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .jogo-vs {
    font-size: 0.5em;
    color: #333;
  }
  .jogo-info {
    font-size: clamp(0.4rem, 1.3vw, 0.6rem);
    color: #3a3a3a;
    letter-spacing: 2px;
    line-height: 2.2;
  }
  .countdown {
    font-size: clamp(0.85rem, 3.5vw, 1.5rem);
    color: #1eff6a;
    letter-spacing: 3px;
    line-height: 1.6;
  }
</style>
</head>
<body>

  <div class="top">
    <div id="hora">00:00</div>
    <div class="progress-wrap"><div id="barra"></div></div>
    <div id="data">--</div>
  </div>

  <div class="divider"></div>

  <div class="bottom">
    <div class="foto-wrap">
      <img src="https://raw.githubusercontent.com/gprdesign/relogio/main/gio.jpg" alt="Gio craque">
    </div>
    <div class="jogo-card">
      <div class="jogo-label">🇧🇷 PRÓXIMO JOGO</div>
      <div class="jogo-times">🇧🇷 BRA <span class="jogo-vs">VS</span> 🇭🇹 HAI</div>
      <div class="jogo-info">SEX 19/06/2026<br>21H30 BRASÍLIA<br>FILADELFIA</div>
      <div class="countdown" id="countdown">--</div>
    </div>
  </div>

  <script>
    const dias  = ["DOMINGO","SEGUNDA","TERCA","QUARTA","QUINTA","SEXTA","SABADO"];
    const meses = ["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
    const JOGO  = new Date("2026-06-20T00:30:00Z"); // 21h30 BRT = 00h30 UTC next day

    function pad(n){ return String(n).padStart(2,"0"); }

    function tick() {
      const now = new Date();

      // Relógio
      document.getElementById("hora").textContent = pad(now.getHours()) + ":" + pad(now.getMinutes());
      document.getElementById("data").textContent =
        dias[now.getDay()] + "  " + now.getDate() + " " + meses[now.getMonth()] + " " + now.getFullYear();
      document.getElementById("barra").style.width = ((now.getSeconds() / 60) * 100) + "%";

      // Countdown
      const diff = JOGO - now;
      if (diff <= 0) {
        document.getElementById("countdown").textContent = "🔴 AO VIVO!";
        return;
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById("countdown").textContent =
        pad(d) + "D " + pad(h) + "H
" + pad(m) + "M " + pad(s) + "S";
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
